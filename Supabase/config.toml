[project]
id = "YOUR_PROJECT_ID"

[api]
port = 54321
schemas = ["public"]

[db]
port = 54322
major_version = 15

[auth]
site_url = "https://gamenight.app"
additional_redirect_urls = ["gamenight://"]
jwt_expiry = 3600
enable_signup = true

[auth.sms]
enable_signup = true
enable_confirmations = true

[auth.sms.twilio]
enabled = true
account_sid = "env(TWILIO_ACCOUNT_SID)"
auth_token = "env(TWILIO_AUTH_TOKEN)"
message_service_sid = "env(TWILIO_MESSAGING_SERVICE_SID)"
