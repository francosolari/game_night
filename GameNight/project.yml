name: GameNight
options:
  bundleIdPrefix: com.gamenight
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  Supabase:
    url: https://github.com/supabase-community/supabase-swift.git
    from: "2.0.0"

targets:
  GameNight:
    type: application
    platform: iOS
    sources:
      - path: GameNight
        excludes:
          - "Info.plist"
          - "Secrets.swift.example"
    info:
      path: GameNight/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - gamenight
        NSContactsUsageDescription: "CardboardWithMe uses your contacts to help you invite friends to game nights. Only the contacts you select are stored."
        NSCalendarsFullAccessUsageDescription: "CardboardWithMe can add game night events to your calendar so you never miss a session."
        CFBundleDisplayName: CWM
        CFBundleName: CardboardWithMe
    entitlements:
      path: GameNight/GameNight.entitlements
      properties:
        aps-environment: development
        com.apple.developer.associated-domains:
          - applinks:cardboardwithme.com
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cardboardwithme.app
        DEVELOPMENT_TEAM: "8AGP3ZJ77K"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_ENTITLEMENTS: GameNight/GameNight.entitlements
    dependencies:
      - package: Supabase

  GameNightTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GameNightTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cardboardwithme.appTests
        DEVELOPMENT_TEAM: YOUR_TEAM_ID_HERE
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.9"
    dependencies:
      - target: GameNight

schemes:
  GameNight:
    build:
      targets:
        GameNight: all
    test:
      targets:
        - GameNightTests
