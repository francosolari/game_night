<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Night - RSVP</title>
    <style>
        :root {
            /* Linear/Raycast inspired palette */
            --bg: #08090A;
            --bg-elevated: #121316;
            --card: #1C1D21;
            --card-hover: #25262B;
            
            /* Electric Blue Primary */
            --primary: #3B82F6;
            --primary-light: #60A5FA;
            --primary-dark: #2563EB;
            
            /* Neutral Secondary */
            --secondary: #64748B;
            
            /* Accents */
            --accent: #14B8A6;
            --success: #10B981;
            --warning: #F59E0B;
            --error: #EF4444;
            
            /* Text */
            --text: #F8FAFC;
            --text-secondary: #94A3B8;
            --text-tertiary: #64748B;
            
            /* UI Elements */
            --divider: rgba(255,255,255,0.08);
            --border: rgba(255,255,255,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 480px;
            width: 100%;
            padding: 32px 20px;
        }

        .hero {
            /* Subtle, professional gradient */
            background: linear-gradient(180deg, rgba(59, 130, 246, 0.15) 0%, rgba(8, 9, 10, 0) 100%);
            padding: 40px 24px;
            border-radius: 16px;
            margin-bottom: 32px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .hero .emoji { font-size: 48px; margin-bottom: 20px; display: inline-block; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3)); }
        .hero h1 { font-size: 26px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
        .hero .host { color: var(--text-secondary); font-size: 15px; font-weight: 500; }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px; /* Tighter corners */
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .section-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 16px;
        }

        .game-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 0;
            border-bottom: 1px solid var(--divider);
        }
        .game-item:last-child { border-bottom: none; }

        .game-thumb {
            width: 56px;
            height: 56px;
            border-radius: 8px;
            background: var(--bg-elevated);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .game-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .game-info { flex: 1; }
        .game-name {
            font-weight: 600;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text);
        }
        .star { color: var(--warning); font-size: 12px; }

        .game-meta {
            color: var(--text-secondary);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
            flex-wrap: wrap;
        }

        .complexity-dots {
            display: flex;
            gap: 3px;
        }
        .complexity-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
        }

        .time-option {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-elevated);
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .time-option:hover {
            border-color: var(--text-tertiary);
            background: var(--card-hover);
        }
        .time-option.selected {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.1); /* Blue tint */
            box-shadow: 0 0 0 1px var(--primary);
        }

        .radio {
            width: 20px;
            height: 20px;
            border: 2px solid var(--text-tertiary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .selected .radio {
            border-color: var(--primary);
            background: var(--primary);
        }
        .radio-inner {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: white;
            display: none;
        }
        .selected .radio-inner { display: block; }

        .time-date { font-weight: 600; font-size: 15px; color: var(--text); }
        .time-time { color: var(--text-secondary); font-size: 14px; margin-top: 2px; }
        .time-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--primary-light);
            background: rgba(59, 130, 246, 0.15);
            padding: 2px 8px;
            border-radius: 6px;
            margin-left: 8px;
            text-transform: uppercase;
        }

        .vote-count {
            color: var(--success);
            font-size: 13px;
            font-weight: 500;
            margin-left: auto;
            background: rgba(16, 185, 129, 0.1);
            padding: 4px 8px;
            border-radius: 6px;
        }

        .rsvp-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 48px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            letter-spacing: -0.2px;
        }
        .btn:active { transform: scale(0.98); }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .btn-primary:hover { background: var(--primary-dark); }

        .btn-row { display: flex; gap: 12px; }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            background: var(--bg-elevated);
        }
        .btn-secondary:hover {
            background: var(--card-hover);
            border-color: var(--text-tertiary);
        }

        .btn-decline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }
        .btn-decline:hover {
            color: var(--error);
            border-color: var(--error);
            background: rgba(239, 68, 68, 0.05);
        }

        .location {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .location-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--text-secondary);
        }
        .location-name { font-weight: 600; color: var(--text); }
        .location-address { color: var(--text-secondary); font-size: 14px; margin-top: 2px; }

        .app-badge {
            text-align: center;
            margin-top: 40px;
            padding: 24px;
            border-top: 1px solid var(--divider);
        }
        .app-badge p { color: var(--text-tertiary); font-size: 14px; margin-bottom: 12px; }
        .app-badge a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }
        .app-badge a:hover { text-decoration: underline; }

        .success-state {
            display: none;
            text-align: center;
            padding: 60px 20px;
        }
        .success-state .check {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 24px;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        .success-state h2 { margin-bottom: 12px; font-size: 24px; letter-spacing: -0.5px; }
        .success-state p { color: var(--text-secondary); font-size: 16px; }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
        }
        .spinner {
            width: 32px;
            height: 32px;
            border: 2px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <!-- Loading state -->
        <div id="loading" class="loading">
            <div class="spinner"></div>
        </div>

        <!-- Main content (populated by JS) -->
        <div id="content" style="display: none;"></div>

        <!-- Success state -->
        <div id="success" class="success-state">
            <div class="check">&#10003;</div>
            <h2 id="success-title">You're in!</h2>
            <p id="success-message">We'll send you a reminder before the event.</p>
        </div>

        <!-- App download badge -->
        <div class="app-badge">
            <p>Get the full experience</p>
            <a href="#">Download Game Night App</a>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        // Get invite token from URL
        const pathParts = window.location.pathname.split('/');
        const inviteToken = pathParts[pathParts.length - 1];

        let inviteData = null;
        let eventData = null;
        let selectedTimeIds = new Set();

        async function fetchInvite() {
            try {
                const res = await fetch(`${SUPABASE_URL}/functions/v1/get-public-invite`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_PUBLISHABLE_KEY,
                        'Authorization': `Bearer ${SUPABASE_PUBLISHABLE_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ invite_token: inviteToken })
                });

                const data = await res.json();
                if (!res.ok || !data) {
                    showError('Invite not found or expired.');
                    return;
                }

                inviteData = data;
                eventData = inviteData.event;
                renderInvite();
            } catch (err) {
                showError('Failed to load invite. Please try again.');
            }
        }

        function getComplexityColor(weight) {
            if (weight < 1.5) return '#10B981';
            if (weight < 2.5) return '#84CC16';
            if (weight < 3.5) return '#F59E0B';
            if (weight < 4.5) return '#F97316';
            return '#EF4444';
        }

        function getComplexityLabel(weight) {
            if (weight < 1.5) return 'Light';
            if (weight < 2.5) return 'Medium Light';
            if (weight < 3.5) return 'Medium';
            if (weight < 4.5) return 'Medium Heavy';
            return 'Heavy';
        }

        function renderInvite() {
            document.getElementById('loading').style.display = 'none';
            const content = document.getElementById('content');
            content.style.display = 'block';

            const games = eventData.games
                .sort((a, b) => (b.is_primary ? 1 : 0) - (a.is_primary ? 1 : 0));

            const gamesHtml = games.map(eg => {
                const g = eg.game;
                const color = getComplexityColor(g.complexity);
                const dots = Array.from({length: 5}, (_, i) =>
                    `<div class="complexity-dot" style="background: ${i < Math.round(g.complexity) ? color : color + '33'}"></div>`
                ).join('');
                const time = g.min_playtime === g.max_playtime
                    ? `${g.min_playtime}min`
                    : `${g.min_playtime}-${g.max_playtime}min`;

                return `
                    <div class="game-item">
                        <div class="game-thumb">
                            ${g.thumbnail_url ? `<img src="${g.thumbnail_url}" alt="${g.name}">` : '🎲'}
                        </div>
                        <div class="game-info">
                            <div class="game-name">
                                ${eg.is_primary ? '<span class="star">★</span>' : ''}
                                ${g.name}
                            </div>
                            <div class="game-meta">
                                <div class="complexity-dots">${dots}</div>
                                <span>${getComplexityLabel(g.complexity)}</span>
                                <span>·</span>
                                <span>⏱ ${time}</span>
                                <span>·</span>
                                <span>👥 ${g.min_players}-${g.max_players}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            const timeOptionsHtml = eventData.time_options.map(opt => {
                const date = new Date(opt.date).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
                const start = new Date(opt.start_time).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
                const end = opt.end_time ? new Date(opt.end_time).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }) : null;
                const label = opt.label ? `<span class="time-label">${opt.label}</span>` : '';

                return `
                    <div class="time-option" data-id="${opt.id}" onclick="toggleTime('${opt.id}')">
                        <div class="radio"><div class="radio-inner"></div></div>
                        <div>
                            <div class="time-date">${date} ${label}</div>
                            <div class="time-time">${start}${end ? ' - ' + end : ''}</div>
                        </div>
                        <div class="vote-count">👍 ${opt.vote_count}</div>
                    </div>
                `;
            }).join('');

            const locationHtml = eventData.location ? `
                <div class="card">
                    <div class="section-title">Location</div>
                    <div class="location">
                        <div class="location-icon">📍</div>
                        <div>
                            <div class="location-name">${eventData.location}</div>
                            ${eventData.location_address ? `<div class="location-address">${eventData.location_address}</div>` : ''}
                        </div>
                    </div>
                </div>
            ` : '';

            content.innerHTML = `
                <div class="hero">
                    <div class="emoji">🎲</div>
                    <h1>${eventData.title}</h1>
                    <div class="host">Hosted by ${eventData.host?.display_name || 'Someone'}</div>
                </div>

                <div class="card">
                    <div class="section-title">Games</div>
                    ${gamesHtml}
                </div>

                <div class="card">
                    <div class="section-title">When works for you?</div>
                    ${timeOptionsHtml}
                </div>

                ${locationHtml}

                ${eventData.description ? `
                    <div class="card">
                        <div class="section-title">Details</div>
                        <p style="color: var(--text-secondary); font-size: 15px;">${eventData.description}</p>
                    </div>
                ` : ''}

                <div class="card">
                    <div class="section-title">RSVP</div>
                    <div class="rsvp-buttons">
                        <button class="btn btn-primary" onclick="respond('accepted')">I'm Going!</button>
                        <div class="btn-row">
                            <button class="btn btn-secondary" onclick="respond('maybe')">Maybe</button>
                            <button class="btn btn-decline" onclick="respond('declined')">Can't Go</button>
                        </div>
                        <p style="margin-top: 14px; color: var(--text-secondary); font-size: 14px; line-height: 1.5;">
                            RSVP requires signing in with the phone number that received this invite.
                        </p>
                    </div>
                </div>
            `;
        }

        function toggleTime(id) {
            const el = document.querySelector(`.time-option[data-id="${id}"]`);
            if (selectedTimeIds.has(id)) {
                selectedTimeIds.delete(id);
                el.classList.remove('selected');
            } else {
                selectedTimeIds.add(id);
                el.classList.add('selected');
            }
        }

        async function respond(status) {
            alert('RSVP requires signing in with the phone number that received this invite.');
        }

        function showSuccess(status) {
            document.getElementById('content').style.display = 'none';
            const success = document.getElementById('success');
            success.style.display = 'block';

            const titles = {
                accepted: "You're in! 🎉",
                maybe: "Noted! 🤔",
                declined: "Maybe next time! 👋"
            };
            const messages = {
                accepted: "We'll send you a reminder before the event.",
                maybe: "We'll keep your spot open. Update anytime!",
                declined: "We'll miss you! We'll invite you next time."
            };

            document.getElementById('success-title').textContent = titles[status];
            document.getElementById('success-message').textContent = messages[status];
        }

        function showError(msg) {
            document.getElementById('loading').style.display = 'none';
            const content = document.getElementById('content');
            content.style.display = 'block';
            content.innerHTML = `
                <div class="hero">
                    <div class="emoji">😕</div>
                    <h1>Oops</h1>
                    <div class="host">${msg}</div>
                </div>
            `;
        }

        // Initialize
        fetchInvite();
    </script>
</body>
</html>
